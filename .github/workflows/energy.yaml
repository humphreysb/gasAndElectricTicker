name: Ohio Energy Tracker

on:
schedule:
- cron: "0 13 * * *"
workflow_dispatch:

permissions:
contents: write

jobs:

run-tracker:
runs-on: ubuntu-latest

```
steps:

  - name: Checkout repo
    uses: actions/checkout@v4
    with:
      persist-credentials: true
      fetch-depth: 0

  - name: Setup Python
    uses: actions/setup-python@v5
    with:
      python-version: "3.11"

  - name: Install packages
    run: |
      pip install pandas requests plotly lxml html5lib

  - name: Run scraper
    run: python energy_scraper.py

  - name: Build dashboard
    run: python build_dashboard.py

  - name: Commit and push updates
    run: |
      git config user.name github-actions
      git config user.email github-actions@github.com

      git add elec_gas_data.csv index.html

      git commit -m "Daily energy update" || echo "No changes to commit"

      git push origin HEAD:main
```
