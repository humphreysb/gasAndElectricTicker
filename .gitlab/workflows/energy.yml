name: Ohio Energy Tracker

on:
schedule:
- cron: "0 13 * * *"
workflow_dispatch:

permissions:
contents: write

jobs:

run-tracker:

```
runs-on: ubuntu-latest

steps:

  - uses: actions/checkout@v4

  - name: Setup Python
    uses: actions/setup-python@v5
    with:
      python-version: "3.11"

  - name: Install packages
    run: |
      pip install pandas requests plotly lxml html5lib

  - name: Run scraper
    run: python energy_scraper.py

  - name: Build dashboard
    run: python build_dashboard.py

  - name: Commit updates
    run: |
      git config --global user.name "github-actions"
      git config --global user.email "github-actions@github.com"
      git add elec_gas_data.csv index.html
      git commit -m "Daily energy update" || echo "No changes"
      git push
```
